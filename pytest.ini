[pytest]
# Pytest 配置文件

# 測試發現模式
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# 測試目錄
testpaths = tests

# 最小化輸出
addopts = 
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# 標記定義
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests
    line_api: LINE API related tests
    gemini_api: Gemini API related tests

# 最小 Python 版本
minversion = 7.0

# 覆蓋率插件配置
[coverage:run]
source = src
omit =
    */__init__.py
    */tests/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
